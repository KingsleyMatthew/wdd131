<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Responsive temple gallery with filters and lazy loading images. Explore old, new, large, and small temples.">
    <meta name="author" content="Kingsley Matthew Edet">
    <meta name="theme-color" content="#2c3e50">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>

<main>
    <form id="reviewForm" method="get" action="review.html">
        <!-- Product Name -->
        <label for="product">Product Name</label>
        <select id="product" name="product" required>
            <option disabled selected>Select a Product ...</option>
        </select>

        <!-- Overall Rating -->
        <fieldset>
          <legend>Overall Rating</legend>
            <div class="star-rating">
                <input type="radio" name="stars" id="star-a" value="5"/>
                <label for="star-a"></label>

                <input type="radio" name="stars" id="star-b" value="4"/>
                <label for="star-b"></label>
            
                <input type="radio" name="stars" id="star-c" value="3"/>
                <label for="star-c" ></label>
            
                <input type="radio" name="stars" id="star-d" value="2"/>
                <label for="star-d" ></label>
            
                <input type="radio" name="stars" id="star-e" value="1"/>
                <label for="star-e"></label>
            </div>

        </fieldset>

        <!-- Date of Installation -->
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>

        <!-- Useful Features -->
        <fieldset>
            <legend>Which features did you find useful in the product? <em>(Check all that apply)</em></legend>
            <label><input type="checkbox" name="features" value="Durability"> Durability</label>
            <label><input type="checkbox" name="features" value="Ease of Use"> Ease of Use</label>
            <label><input type="checkbox" name="features" value="Performance"> Performance</label>
            <label><input type="checkbox" name="features" value="Design"> Design</label>
        </fieldset>

        <!-- Written Review -->
        <label for="review">Written Review <span>(Optional)</span></label>
        <textarea id="review" name="review" rows="4"></textarea>

        <!-- User Name -->
        <label for="username">Your Name <span>(Optional)</span></label>
        <input type="text" id="username" name="username">

        <!-- Submit -->
        <input type="submit" value="Post Review">
    </form>
</main>

<footer>
<p>© <span id="year"></span> ⫽ Kingsley Matthew ⫽ Nigeria</p>
<p>Last Modification: <span id="modified"></span></p>
</footer>

<script src="scripts/form.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mercedes Luxury Hub">
<meta name="author" content="Kingsley Matthew Edet">
<title>Mercedes Luxury Hub</title>

<link rel="stylesheet" href="styles/index.css">
</head>

<body>

<header>
  <nav class="navbar">
    <img src="images/logo.svg" alt="Luxury Hub Logo" class="nav-logo">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search Mercedes models..." aria-label="Search Mercedes models">

      <div id="suggestions" class="suggestions"></div>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="models.html">Models</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle Menu">
      ☰
    </button>
  </nav>
</header>
<main>

  <section class="hero">
    <img src="images/logo.svg" alt="Luxury Hub Logo" class="hero-logo">

    <h2>Luxury. Performance. Innovation.</h2>
    <button type="button" onclick="scrollToModels()">Explore Models</button>
  </section>

  <section id="models">
    <h2>Featured Cars</h2>
    <div id="carContainer" class="grid"></div>
  </section>

  <section id="gallery">
    <h2>Car Gallery</h2>

    <div class="slider">
      <button type="button" onclick="prevImage()" aria-label="Previous Image">◀</button>

      <img id="sliderImage" src="images/E_class.webp" alt="Car Image" loading="lazy">

      <button type="button" onclick="nextImage()" aria-label="Next Image">▶</button>
    </div>
  </section>
</main>

<div id="modal" class="modal" role="dialog" aria-modal="true"></div>

<footer>
  <p>© 2026 Mercedes Luxury Hub</p>
  <a href="references.html">References</a>
</footer>

<script src="scripts/index.js"></script>
</body>
</html>
